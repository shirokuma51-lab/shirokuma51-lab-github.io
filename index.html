<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">


<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>


<style>


@font-face{

font-family:"Akogare";

src:url("akogarenomarumoji.ttf");

}



html,body{

margin:0;

width:100%;

height:100%;

overflow:hidden;

background:transparent;

}



#game{

width:1536px;

height:2048px;

position:relative;

transform-origin:top left;

}




/* ボタン */

#startBtn,
#optionBtn,
#resetBtn{

position:absolute;

z-index:999;

cursor:pointer;

}



#startBtn{

top:80px;

left:250px;

width:350px;

}


#optionBtn{

top:80px;

left:50%;

transform:translateX(-50%);

width:250px;

}


#resetBtn{

top:80px;

right:250px;

width:350px;

}





/* カード */

#memory{

position:absolute;

top:450px;

left:50%;

transform:translateX(-50%);

display:none;

gap:50px;

z-index:2;

}



.card{

width:300px;

height:300px;

position:relative;

cursor:pointer;

}



.card img{

width:300px;

height:300px;

border-radius:30px;

}



.cardNumber{


position:absolute;


top:0;

left:0;


width:100%;
height:100%;

font-size:90px;



display:flex;

align-items:center;

justify-content:center;




font-family:"Akogare";

font-size:150px;

color:black;

text-shadow:

4px 4px 0 pink;


pointer-events:none;


}




#optionMenu{

position:absolute;

top:350px;

left:50%;

transform:translateX(-50%);


background:rgba(0,0,0,.7);

color:white;


padding:50px;


border-radius:30px;


font-size:45px;


display:none;


z-index:1000;

}


select,button{

font-size:35px;

}



canvas{

position:absolute;

top:0;

left:0;

z-index:1;

pointer-events:none;

}



</style>


</head>



<body>



<div id="game">



<img id="startBtn" src="start.png">


<img id="optionBtn" src="option.png">


<img id="resetBtn" src="reset.png">



<div id="memory"></div>



<div id="optionMenu">


<h2>設定</h2>


ペア数


<br>


<select id="cardCount">


<option value="3">3ペア</option>

<option value="6">6ペア</option>

<option value="10">10ペア</option>


</select>


<br><br>



種類数


<br>


<select id="iconCount">


<option value="3">3種類</option>

<option value="4">4種類</option>

<option value="5">5種類</option>


</select>


<br><br>


<button id="closeOption">

決定

</button>


</div>



</div>





<script>



const WIDTH=1536;

const HEIGHT=2048;



// 音

const sounds={


flip:new Audio("flip.mp3"),

correct:new Audio("correct.mp3"),

miss:new Audio("miss.mp3"),

drop:new Audio("drop.mp3")


};



function playSound(name){

sounds[name].currentTime=0;

sounds[name].play();

}





// Matter


const {

Engine,

Render,

World,

Bodies


}=Matter;



const engine=Engine.create();



const render=Render.create({

element:game,

engine:engine,


options:{


width:WIDTH,

height:HEIGHT,

background:"transparent",

wireframes:false


}


});



Render.run(render);

Engine.run(engine);






World.add(engine.world, [

  // 床
  Bodies.rectangle(WIDTH/2, HEIGHT-40, WIDTH, 80, {isStatic:true}),
  // 左壁
  Bodies.rectangle(0, HEIGHT/2, 80, HEIGHT, {isStatic:true}),
  // 右壁
  Bodies.rectangle(WIDTH, HEIGHT/2, 80, HEIGHT, {isStatic:true}),
]);







function dropIcon(image){



let ball=Bodies.circle(


Math.random()*1000+200,


100,


120,


{


restitution:0,

friction:1,


render:{


sprite:{


texture:image,

xScale:.35,

yScale:.35


}


}



}



);



World.add(engine.world,ball);


playSound("drop");


}








let icons=[

"cat.png",

"cat2.png",

"cat3.png",

"cat4.png",

"cat5.png"


];



let first=null;

let second=null;







function startMemory(){



resetMemory();


let cards=[];



let pair=

Number(cardCount.value);



let type=

Number(iconCount.value);





for(let i=0;i<pair;i++){


let icon=

icons[i%type];



cards.push(icon);


cards.push(icon);



}



cards.sort(()=>Math.random()-0.5);




let area=document.getElementById("memory");

area.style.display="grid";


// 配置＋カードサイズ変更

if(pair === 3){

area.style.gridTemplateColumns =
"repeat(2,300px)";

document.querySelectorAll(".card").forEach(c=>{
c.style.width="300px";
c.style.height="300px";
});


}


else if(pair === 6){

area.style.gridTemplateColumns =
"repeat(3,250px)";


document.querySelectorAll(".card").forEach(c=>{
c.style.width="250px";
c.style.height="250px";
});


}



else if(pair === 10){

area.style.gridTemplateColumns =
"repeat(4,180px)";


document.querySelectorAll(".card").forEach(c=>{
c.style.width="180px";
c.style.height="180px";
});


}


let numberCount = 1;


cards.forEach(icon=>{



let div=document.createElement("div");


div.className="card";



let img=document.createElement("img");


img.src="back.png";



let number=document.createElement("div");


number.className="cardNumber";



number.innerHTML = numberCount;

numberCount++;



div.appendChild(img);

div.appendChild(number);






div.onclick=()=>{


playSound("flip");


number.style.display="none";



img.src=icon;



if(!first){


first={

div,

img,

number,

answer:icon


};


}


else if(!second){



second={

div,

img,

number,

answer:icon


};



setTimeout(checkPair,600);


}



};



area.appendChild(div);



});



}





function checkPair(){



if(first.answer===second.answer){


playSound("correct");


dropIcon(first.answer);



setTimeout(()=>{


first.div.style.visibility="hidden";


second.div.style.visibility="hidden";


},300);



}

else{


playSound("miss");



first.img.src="back.png";

second.img.src="back.png";



first.number.style.display="flex";

second.number.style.display="flex";


}




first=null;

second=null;



}







function resetMemory(){


memory.innerHTML="";


memory.style.display="none";


first=null;

second=null;


}







startBtn.onclick=startMemory;


resetBtn.onclick=resetMemory;



optionBtn.onclick=()=>{


optionMenu.style.display="block";


};



closeOption.onclick=()=>{


optionMenu.style.display="none";


};







function resize(){


let scale=Math.min(

innerWidth/WIDTH,

innerHeight/HEIGHT


);



game.style.transform=

`scale(${scale})`;



}



window.onresize=resize;

resize();



</script>


</body>


</html>
