<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

  <img id="startBtn" class="btn-interactive" src="start.png">
  <img id="optionBtn" class="btn-interactive" src="option.png">
  <img id="resetBtn" class="btn-interactive" src="reset.png">

  <!-- Lucky Chanceを強制中断する配信者用ボタン。常時表示しておき、発生していない時は押しても何も起きない -->
  <button id="emergencyStopBtn" class="btn-interactive">緊急停止</button>

  <div id="memory"></div>

  <!-- 【演出】連続正解時の「N COMBO!」表示。中身と表示タイミングはJS(memoryGame.js)側で制御 -->
  <div id="comboDisplay"></div>

  <!-- Lucky Chance スロット演出エリア -->
  <div id="slotMachine"></div>

  <!-- 【動作確認用の仮ボタン】視聴者用ページができるまでの間、配信者がここを押して桁を止める -->
  <button id="slotStopTestBtn" class="btn-interactive">STOP（テスト用）</button>

  <div id="optionMenu">
    <h2>設定</h2>

    ペア数
    <br>
    <select id="cardCount">
      <option value="3">3ペア</option>
      <option value="6">6ペア</option>
      <option value="10">10ペア</option>
    </select>
    <br><br>

    種類数
    <br>
    <select id="iconCount">
      <option value="3">3種類</option>
      <option value="4">4種類</option>
      <option value="5">5種類</option>
    </select>
    <br><br>

    背景
    <br>
    <select id="backgroundSelect">
      <option value="transparent">透明（OBS用）</option>
      <option value="green">グリーンバック</option>
      <option value="white">白</option>
      <option value="black">黒</option>
    </select>
    <br><br>

    <button id="closeOption" class="btn-interactive">決定</button>
  </div>

</div>

<!-- 全ファイルがルート直下にある構成なので、フォルダを付けずに直接読み込む -->
<script type="module" src="main.js"></script>

</body>
</html>
